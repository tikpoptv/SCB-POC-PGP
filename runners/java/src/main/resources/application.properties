# Java_Runner CLI shell configuration (task 11.1).
#
# Keep the process a pure CLI: no banner, no web server, and no chatty startup
# logging on stdout. All logs go to stderr (see logback.xml) so stdout holds
# only the single RunnerOutput JSON object required by the contract.
spring.main.banner-mode=off
spring.main.web-application-type=none
spring.main.log-startup-info=false
