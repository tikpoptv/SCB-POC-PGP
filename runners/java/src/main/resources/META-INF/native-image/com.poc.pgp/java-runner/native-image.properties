# GraalVM Native Image build-time configuration for java-native-stream-parallel.
# These properties supplement the reachability-metadata.json captured by the
# GraalVM tracing agent (AgentExercise) and the top-level reachability-metadata.json.
#
# The --no-fallback and security-provider flags are also set in pom.xml (native
# profile) so both Maven and this standalone file stay consistent.

Args = --no-fallback \
       -H:+ReportExceptionStackTraces \
       -H:AdditionalSecurityProviders=org.bouncycastle.jce.provider.BouncyCastleProvider \
       --initialize-at-build-time=org.bouncycastle.jce.provider.BouncyCastleProvider \
       --initialize-at-run-time=org.bouncycastle.jce.provider.BouncyCastleProvider \
       -H:ReflectionConfigurationFiles=${.}/reflect-config.json \
       -H:ResourceConfigurationFiles=${.}/resource-config.json
